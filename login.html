<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Flix - Login e Registo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .toggle-text {
            color: #8c8c8c;
            margin-top: 20px;
            font-size: 0.95rem;
            text-align: left;
        }
        .toggle-text span {
            color: #fff;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-text span:hover {
            text-decoration: underline;
        }
        .hidden-panel {
            display: none !important;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div id="panel-login">
            <h2>Entrar no Cine Flix</h2>
            <form id="form-login">
                <input type="email" id="login-email" placeholder="E-mail ou número de telemóvel" required>
                <input type="password" id="login-password" placeholder="Palavra-passe" required>
                <button type="submit" class="login-btn">Entrar</button>
            </form>
            <p class="toggle-text">Novo no Cine Flix? <span onclick="changePanel('register')">Registe-se agora.</span></p>
        </div>

        <div id="panel-register" class="hidden-panel">
            <h2>Criar uma Conta</h2>
            <form id="form-register">
                <input type="text" id="reg-name" placeholder="Nome completo" required>
                <input type="email" id="reg-email" placeholder="Endereço de e-mail" required>
                <input type="password" id="reg-password" placeholder="Definir palavra-passe" minlength="6" required>
                <button type="submit" class="login-btn" style="background-color: #b20710;">Registar Conta</button>
            </form>
            <p class="toggle-text">Já tem uma conta? <span onclick="changePanel('login')">Iniciar sessão.</span></p>
        </div>
    </div>

    <script>
        // Alternador de Formulários
        function changePanel(target) {
            const login = document.getElementById("panel-login");
            const register = document.getElementById("panel-register");
            if (target === 'register') {
                login.classList.add("hidden-panel");
                register.classList.remove("hidden-panel");
            } else {
                login.classList.remove("hidden-panel");
                register.classList.add("hidden-panel");
            }
        }

        // Evento de Registo / Cadastro
        document.getElementById("form-register").addEventListener("submit", function(e) {
            e.preventDefault();
            const email = document.getElementById("reg-email").value.trim().toLowerCase();
            const password = document.getElementById("reg-password").value.trim();

            if (localStorage.getItem(`cineflix_user_${email}`)) {
                alert("Este endereço de e-mail já se encontra registado.");
                return;
            }

            // Armazena as credenciais
            localStorage.setItem(`cineflix_user_${email}`, password);
            alert("Conta criada com sucesso! Faça login para aceder à plataforma.");
            changePanel('login');
        });

        // Evento de Validação de Login
        document.getElementById("form-login").addEventListener("submit", function(e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value.trim().toLowerCase();
            const password = document.getElementById("login-password").value.trim();

            // Credencial administrativa de emergência para testes
            if (email === "admin@cineflix.com" && password === "123456") {
                localStorage.setItem("logado", "true");
                window.location.href = "index.html";
                return;
            }

            // Pesquisa as credenciais registadas no dispositivo
            const validPassword = localStorage.getItem(`cineflix_user_${email}`);

            if (validPassword && validPassword === password) {
                localStorage.setItem("logado", "true");
                window.location.href = "index.html";
            } else {
                alert("E-mail ou palavra-passe incorretos. Por favor, tente novamente.");
            }
        });
    </script>
</body>
</html>
