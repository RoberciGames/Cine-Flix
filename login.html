<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <header class="auth-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo">
    </header>

    <div class="login-container">
        <h2 id="auth-title">Entrar</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit" id="btn-submit" class="btn-primary">Entrar</button>
        </form>
        <p class="switch-auth" id="switch-text">Novo por aqui? <span id="go-to-register">Assine agora.</span></p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
