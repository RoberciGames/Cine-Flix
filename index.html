<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Flix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo">CINE FLIX</div>
        <div class="nav-right">
            <input type="text" id="search-input" class="search-bar" placeholder="Buscar filmes, séries e animes...">
            <button id="logout-btn" class="btn-logout">Sair</button>
        </div>
    </nav>

    <header class="banner" id="banner">
        <div class="banner-contents">
            <h1 class="banner-title" id="banner-title">Carregando...</h1>
            <p class="banner-description" id="banner-desc">Preparando o melhor do entretenimento para você...</p>
            <div class="banner-buttons">
                <button class="banner-btn play">▶ Assistir</button>
                <button class="banner-btn info">ⓘ Mais Informações</button>
            </div>
        </div>
        <div class="banner-fadeBottom"></div>
    </header>

    <div id="search-container" class="rows-container" style="display: none;">
        <div class="row">
            <h2>Resultados da Busca</h2>
            <div class="row-posters search-grid" id="search-row"></div>
        </div>
    </div>

    <div id="main-content" class="rows-container">
        <div class="row">
            <h2>Séries Originais</h2>
            <div class="row-posters" id="originals-row"></div>
        </div>
        <div class="row">
            <h2>Em Alta</h2>
            <div class="row-posters" id="trending-row"></div>
        </div>
        <div class="row">
            <h2>Ação e Aventura</h2>
            <div class="row-posters" id="action-row"></div>
        </div>
        <div class="row">
            <h2>Animes de Destaque</h2>
            <div class="row-posters" id="anime-row"></div>
        </div>
    </div>

    <div id="video-modal" class="modal-hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div id="iframe-container"></div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
