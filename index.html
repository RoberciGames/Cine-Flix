<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Flix - Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar" class="nav">
        <h1 style="color: #e50914; font-weight: bold; font-size: 28px; cursor: pointer;">CINE FLIX</h1>
        <div class="nav-right">
            <input type="text" id="search-input" placeholder="Pesquisar filmes, séries...">
            <button onclick="logout()" class="logout-btn">Sair</button>
        </div>
    </div>

    <header id="banner" class="banner">
        <div class="banner-contents">
            <h1 id="banner-title" class="banner-title">Carregando...</h1>
            <div class="banner-buttons">
                <button class="banner-btn play">► Assistir</button>
                <button class="banner-btn info">ℹ Mais Informações</button>
            </div>
            <p id="banner-desc" class="banner-description"></p>
        </div>
        <div class="banner-fadeBottom"></div>
    </header>

    <div id="main-content">
        <div class="row-container">
            <h2 class="row-title">Originais Cine Flix</h2>
            <div id="originals-row" class="row"></div>
        </div>

        <div class="row-container">
            <h2 class="row-title">Os Meus Filmes Exclusivos</h2>
            <div id="my-movies-row" class="row"></div>
        </div>

        <div class="row-container">
            <h2 class="row-title">As Minhas Séries Exclusivas</h2>
            <div id="my-series-row" class="row"></div>
        </div>

        <div class="row-container">
            <h2 class="row-title">Tendências Atuais</h2>
            <div id="trending-row" class="row"></div>
        </div>

        <div class="row-container">
            <h2 class="row-title">Animes</h2>
            <div id="anime-row" class="row"></div>
        </div>
    </div>

    <div id="search-container" style="display: none; padding-top: 100px;">
        <h2 class="row-title">Resultados da Pesquisa</h2>
        <div id="search-row" class="row search-grid"></div>
    </div>

    <div id="video-modal" class="modal-hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div id="iframe-container" class="iframe-wrapper"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
